<!DOCTYPE html>
<html>
<head>
<title>Fake News Detector</title>
</head>

<body>

<h2>Fake News Detection</h2>

<textarea id="text" placeholder="Enter news"></textarea><br><br>

<input type="text" id="url" placeholder="Source URL"><br><br>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>
function analyze() {
    let text = document.getElementById("text").value;
    let url = document.getElementById("url").value;

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text, url: url})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "Result: " + data.result +
            "<br>Confidence: " + (data.confidence * 100).toFixed(2) + "%" +
            "<br>Level: " + data.level;
    });
}
</script>

</body>
</html>
